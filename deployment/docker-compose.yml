# CMF 供应链管理系统 - Docker Compose 部署配置
# 使用方法：docker-compose up -d

version: '3.8'

services:
  # 后端 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmf-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=2
      - DATABASE_MODE=sqlite
      - DATABASE_URL=sqlite:///./data/cmf_database.db
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    networks:
      - cmf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: cmf-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - api
    networks:
      - cmf-network

  # PostgreSQL 数据库 (可选，生产环境使用)
  postgres:
    image: postgres:15-alpine
    container_name: cmf-postgres
    restart: always
    environment:
      POSTGRES_DB: cmf_db
      POSTGRES_USER: cmf_user
      POSTGRES_PASSWORD: cmf_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cmf-network
    profiles:
      - with-postgres

  # Redis 缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: cmf-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cmf-network
    profiles:
      - with-redis

volumes:
  postgres_data:
  redis_data:

networks:
  cmf-network:
    driver: bridge
