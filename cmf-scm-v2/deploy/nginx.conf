# Nginx Reverse Proxy Configuration for CMF SCM System
# Place this file in /etc/nginx/sites-available/cmf-scm
# Then: ln -s /etc/nginx/sites-available/cmf-scm /etc/nginx/sites-enabled/

upstream cmf_scm {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain or IP

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/cmf-scm-access.log;
    error_log /var/log/nginx/cmf-scm-error.log;

    # Client body size limit (for file uploads if needed)
    client_max_body_size 10M;

    location / {
        proxy_pass http://cmf_scm;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
    }

    # Health check endpoint (optional, for load balancers)
    location /health {
        proxy_pass http://cmf_scm/api/health;
        access_log off;
    }
}
